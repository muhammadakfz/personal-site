<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="mf favicon">
    <defs>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Yellowtail&amp;display=swap");

            .bg {
                fill: #111827;
            }

            .fg {
                fill: #f9fafb;
                font-family: "Yellowtail", cursive;
                font-size: 39px;
                font-weight: 400;
            }

            @media (prefers-color-scheme: dark) {
                .bg {
                    fill: #f9fafb;
                }

                .fg {
                    fill: #111827;
                }
            }
        </style>
    </defs>

    <rect class="bg" x="2" y="2" width="60" height="60" rx="14" />
    <text class="fg" x="50%" y="55%" text-anchor="middle" dominant-baseline="middle">mf</text>
</svg>
